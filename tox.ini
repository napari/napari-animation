# For more information about tox, see https://tox.readthedocs.io/en/latest/
[tox]
envlist = py{310,312,314}-{linux,windows,macos}-pyqt6, py312-{linux,windows}-pyside6, py312-{linux,windows}-pyqt5, py310-{linux,windows}-pyside2

[gh-actions]
python =
    3.10: py310
    3.12: py312
    3.14: py314

[gh-actions:env]
PLATFORM =
    ubuntu-latest: linux
    macos-latest: macos
    windows-latest: windows

QT_PACKAGE =
    pyqt6: pyqt6
    pyside6: pyside6
    pyqt5: pyqt5
    pyside2: pyside2

[testenv]
platform =
    linux: linux
    macos: darwin
    windows: win32
passenv =
    CI
    GITHUB_ACTIONS
    DISPLAY
    XAUTHORITY
    NUMPY_EXPERIMENTAL_ARRAY_FUNCTION
    PYVISTA_OFF_SCREEN
    QT_PACKAGE
dependency_groups =
    dev

commands = pytest -v --color=yes --cov=napari_animation --cov-report=xml

[testenv:py{310,312,314}-{linux,macos,windows}-pyqt6]
deps =
    napari[pyqt6]

[testenv:py312-{linux,windows}-pyside6]
deps =
    napari[pyside6]

[testenv:py312-{linux,windows}-pyqt5]
deps =
    napari[pyqt5]

[testenv:py310-{linux,windows}-pyside2]
deps =
    pytest-qt<4.5  # pytest-qt 4.5 dropped PySide2 support due to the end of life of PySide2.
    napari[pyside2]<0.7.0  # napari 0.7 removed PySide2 support.
    numpy<2
